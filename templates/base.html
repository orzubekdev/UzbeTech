<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}UzbeTech - Premium IT Solutions{% endblock %}</title>
    <meta name="description" content="UzbeTech: World-class, premium, highly secure IT company platform.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- Base Styles -->
    <link rel="stylesheet" href="/static/css/globals.css">
    <link rel="stylesheet" href="/static/css/animations.css">
    
    {% block extra_head %}{% endblock %}
</head>
<body class="page-transition">

    <!-- Intro Cinematic (Only shows on first load controlled by JS) -->
    <div id="intro-screen">
        <div class="intro-logo-container">
            <div class="intro-logo-mark">UT</div>
            <div class="intro-logo-text">UZBETECH</div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="navbar" style="position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); background: rgba(1, 28, 64, 0.85); border-bottom: 1px solid rgba(167,235,242,0.1);">
        <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
            <a href="/" style="display:flex; align-items:center; gap: 10px;">
                <div style="font-family: var(--font-display); font-weight:800; font-size:1.8rem; color:#fff;">
                    <span style="color:var(--color-glow);">U</span>T
                </div>
                <span class="logo-text" style="font-family: var(--font-display); font-weight:700; font-size: 1.2rem; letter-spacing: 2px;">UZBETECH</span>
            </a>
            
            <div style="display:flex; align-items:center; gap: 30px;">
                <div class="nav-links" style="display:flex;">
                    <a href="/" data-i18n="nav_home">Home</a>
                    <a href="/services" data-i18n="nav_services">Services</a>
                    <a href="/portfolio" data-i18n="nav_portfolio">Portfolio</a>
                    <a href="/about" data-i18n="nav_about">About</a>
                    <a href="/#contact" data-i18n="nav_contact">Contact</a>
                </div>

                <!-- Language Switcher -->
                <div class="lang-switcher" style="display:flex; gap:10px; align-items:center; font-size: 0.9em; font-family:var(--font-display);">
                    <span style="cursor:pointer; opacity:1; transition:opacity 0.2s;" data-lang-btn="uz">UZ</span>
                    <span style="opacity:0.3;">|</span>
                    <span style="cursor:pointer; opacity:0.5; transition:opacity 0.2s;" data-lang-btn="ru">RU</span>
                    <span style="opacity:0.3;">|</span>
                    <span style="cursor:pointer; opacity:0.5; transition:opacity 0.2s;" data-lang-btn="en">EN</span>
                </div>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>



    <!-- Global Footer -->
    <footer style="padding: var(--spacing-md) 0; text-align: center;">
        <div class="container">
            <p style="opacity: 0.5; font-size: 0.9em;" data-i18n="footer_copy">&copy; 2026 UzbeTech. Barcha huquqlar himoyalangan. Korporativ darajadagi xavfsizlik va dizayn.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/main.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>

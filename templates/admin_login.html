{% extends 'base.html' %}

{% block title %}UzbeTech - Secure Admin Portal{% endblock %}

{% block extra_head %}
<style>
    .admin-login-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding-top: 80px;
    }
    .admin-glass {
        width: 100%;
        max-width: 450px;
        background: rgba(1, 28, 64, 0.7);
        padding: 40px;
        position: relative;
    }
    
    .admin-glass::before {
        content: '';
        position: absolute;
        top:0; left:0; width:100%; height:3px;
        background: var(--color-glow);
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        font-family: var(--font-display);
        font-size: 0.9rem;
        color: #ccc;
        margin-bottom: 8px;
    }
    .form-control {
        width: 100%;
        padding: 12px 15px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(167, 235, 242, 0.2);
        border-radius: var(--radius-md);
        color: #fff;
        font-family: var(--font-primary);
        font-size: 1rem;
        transition: border-color var(--transition-smooth);
    }
    .form-control:focus {
        outline: none;
        border-color: var(--color-glow);
    }
</style>
{% endblock %}

{% block content %}
<div class="grid-bg"></div>

<div class="admin-login-wrapper">
    <div class="glass-panel admin-glass reveal-up">
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="font-family: var(--font-display); font-weight:800; font-size:2rem; color:#fff; display:inline-block; border:2px solid var(--color-glow); border-radius:10px; width:60px; height:60px; line-height:56px; margin-bottom:15px;">UT</div>
            <h2 style="margin:0;">System Access</h2>
            <p style="opacity: 0.6; font-size: 0.9rem; margin-top:5px;">Secure Authentication Required</p>
        </div>
        
        <form action="/admin/login" method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="admin@uzbetech.local" required autocomplete="email">
            </div>
            <div class="form-group">
                <label>Master Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primary" style="width:100%; margin-top:10px;">Authenticate Session</button>
        </form>
        
        <div style="text-align:center; opacity:0.3; margin-top:30px; font-size:0.75rem;">
            IP Tracking Active. Unauthorized access is strictly logged.
        </div>
    </div>
</div>
{% endblock %}
